services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:Z
      - caddy_data:/data
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    volumes:
      - /data/ebooks:/data/ebooks:Z   # private e-book volume; SELinux-labelled (:Z)
    depends_on:
      - postgres
    restart: unless-stopped           # no host port — reached via Caddy only

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ebook
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped           # port 5432 intentionally NOT published

volumes:
  caddy_data:
  pgdata:
